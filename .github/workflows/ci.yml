name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    name: CLI — validate + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      # NOTE: submodules are INTENTIONALLY not fetched. The CLI package
      # (`packages/cli/`) has zero runtime or test dependencies on
      # `underproxy` / `undrllai` — those are unrelated service repos that
      # happen to live under this monorepo as submodules and are private /
      # auth-gated for CI runners anyway. Pulling them would both fail
      # (repository-not-found) and waste minutes for no benefit.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run validate

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Verify bin is runnable
        run: node ./bin/helpers.mjs --help

  drift-check:
    name: Config drift — .claude/ sources vs generated trees
    runs-on: ubuntu-latest
    needs: cli-tests
    steps:
      - uses: actions/checkout@v4
        # Same rationale as cli-tests: no submodules.

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Build CLI
        working-directory: packages/cli
        run: |
          npm ci
          npm run build

      - name: Regenerate in-place
        # This repo is the UPSTREAM template (has helpers.config.ts, no
        # helpers-lock.json). `status --strict` is the wrong tool here —
        # that's designed for consumer repos with a lockfile. For upstream
        # drift detection we run `regen` and then diff.
        run: node packages/cli/bin/helpers.mjs regen

      - name: Fail if regen produced differences vs committed tree
        # If regen changed anything that's tracked in git, someone edited
        # a generated file by hand (.github/prompts/, .gemini/, GEMINI.md,
        # .github/copilot-instructions.md, .agent/) without running regen
        # — OR they edited a .claude/ source without regenerating.
        # Either way: fix by editing .claude/ + CLAUDE.md + .github/
        # instructions/{coding,persona} sources, then running
        # `node packages/cli/bin/helpers.mjs regen` and committing.
        run: |
          set -e
          diff_ok=1
          if ! git diff --exit-code; then
            diff_ok=0
          fi
          untracked=$(git ls-files --others --exclude-standard)
          if [ -n "$untracked" ]; then
            echo "::error::regen produced new untracked files:"
            printf '%s\n' "$untracked"
            diff_ok=0
          fi
          if [ "$diff_ok" -eq 0 ]; then
            echo "::error::Drift detected. Run \`node packages/cli/bin/helpers.mjs regen\` locally and commit the result."
            exit 2
          fi

  lint-commits:
    name: Commit messages — Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: |
          if [ -f commitlint.config.js ] || [ -f .commitlintrc.js ] || [ -f .commitlintrc.json ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
          else
            echo "No commitlint config — skipping (configure commitlint.config.js to enforce)"
          fi
