name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    name: CLI — validate + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run validate

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Verify bin is runnable
        run: node ./bin/helpers.mjs --help

  drift-check:
    name: Config drift — .claude/ vs generated trees
    runs-on: ubuntu-latest
    needs: cli-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/cli/package-lock.json

      - name: Build CLI
        working-directory: packages/cli
        run: |
          npm ci
          npm run build

      - name: Run status --strict (detect unsynced generated files)
        run: node packages/cli/bin/helpers.mjs status --strict
        # Exit 2 = drift detected. Someone edited .github/prompts/,
        # .github/instructions/*.instructions.md, .gemini/, GEMINI.md,
        # or .github/copilot-instructions.md by hand instead of editing
        # .claude/ and running `sync`. Fix: edit .claude/ source, run
        # `npx clai-helpers sync`, commit both.

  lint-commits:
    name: Commit messages — Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install commitlint
        run: |
          npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: |
          if [ -f commitlint.config.js ] || [ -f .commitlintrc.js ] || [ -f .commitlintrc.json ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
          else
            echo "No commitlint config — skipping (configure commitlint.config.js to enforce)"
          fi
